<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generate Question — TeacherAId</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app-layout" id="root"></div>
  <script src="config.js"></script>
  <script src="sidebar.js"></script>
  <script>
    function getFeedbackHistory() {
      return JSON.parse(localStorage.getItem('feedbackHistory_' + getTeacherId()) || '[]');
    }
    function saveFeedbackHistory(arr) {
      localStorage.setItem('feedbackHistory_' + getTeacherId(), JSON.stringify(arr));
    }

    function render() {
      const history = getFeedbackHistory();
      const weakest = localStorage.getItem('weakestConcept_' + getTeacherId());

      document.getElementById('root').innerHTML = buildSidebar('generate') + `
        <div class="main">
          <div class="topbar">
            <div>
              <div class="topbar-title">Generate Question</div>
              <div class="topbar-sub">Backend AI generates and saves the question automatically</div>
            </div>
          </div>
          <div class="page-content animate-in">
            <div class="gen-layout">

              <!-- Left panel -->
              <div>

                <!-- Step 1: options -->
                <div class="card mb-5">
                  <div class="card-header"><div class="card-title">✨ Step 1 — Configure the question</div></div>
                  <div class="card-body">

                    ${weakest ? `
                    <div class="alert alert-info" style="margin-bottom:16px;">
                      ⚠️ Analytics show the class is weakest at <strong>${escHtml(weakest)}</strong> — consider generating a question on this topic.
                    </div>` : ''}

                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">Concept</label>
                        <select class="form-input" id="concept" style="cursor:pointer;">
                          <option value="loops">Loops</option>
                          <option value="conditionals">Conditionals</option>
                          <option value="variables">Variables</option>
                          <option value="lists">Lists</option>
                        </select>
                        <div class="form-hint">Choose the Python concept to target.</div>
                      </div>
                      <div class="form-group">
                        <label class="form-label">Difficulty</label>
                        <select class="form-input" id="difficulty" style="cursor:pointer;">
                          <option value="easy">Easy</option>
                          <option value="medium">Medium</option>
                          <option value="hard">Hard</option>
                        </select>
                      </div>
                    </div>

                    <div class="form-group">
                      <label class="form-label">Question Type</label>
                      <select class="form-input" id="questionType" style="cursor:pointer;">
                        <option value="predict_output">Predict Output — student reads code and states what it prints</option>
                        <option value="explain_error">Explain Error — student identifies what's wrong and why</option>
                        <option value="trace_variable">Trace Variable — student follows a variable's value through execution</option>
                        <option value="fix_bug">Fix the Bug — student corrects a broken snippet</option>
                      </select>
                    </div>

                    <div id="genAlertBox"></div>

                    <button class="btn btn-primary btn-lg" id="genBtn" onclick="generate()">
                      <span id="genBtnText">✨ Generate & Save Question</span>
                    </button>
                    <div class="form-hint" style="margin-top:8px;">The question is generated by the backend AI and saved automatically — no extra save step needed.</div>
                  </div>
                </div>

                <!-- Step 2: result (hidden until generated) -->
                <div class="card mb-5" id="resultCard" style="display:none;">
                  <div class="card-header">
                    <div class="card-title">✅ Step 2 — Question generated & saved</div>
                    <span class="badge badge-green" id="resultQid"></span>
                  </div>
                  <div class="card-body">
                    <div class="form-group">
                      <label class="form-label">Concept</label>
                      <div class="form-display" id="resConcept"></div>
                    </div>
                    <div class="form-group">
                      <label class="form-label">Question Prompt</label>
                      <div class="form-display" id="resPrompt"></div>
                    </div>
                    <div class="form-group" id="resCodeWrap">
                      <label class="form-label">Code Snippet</label>
                      <pre id="resCode" style="background:#1e1d3f;color:#c8c5f8;border-radius:var(--radius);padding:14px 16px;font-size:0.85rem;overflow-x:auto;white-space:pre-wrap;line-height:1.65;margin:0;"></pre>
                    </div>
                    <div class="form-group">
                      <label class="form-label">Correct Answer</label>
                      <div class="form-display" id="resAnswer"></div>
                    </div>
                    <div class="form-group" id="resMisconWrap" style="display:none;">
                      <label class="form-label">Target Misconception</label>
                      <div class="form-display" id="resMiscon"></div>
                    </div>
                    <div class="alert alert-success" style="margin-top:4px;">
                      ✓ This question is now the <strong>active question</strong> — students will see it when they sign in.
                      <a href="teacher-questions.html" style="color:inherit;font-weight:700;margin-left:8px;">View all questions →</a>
                    </div>
                  </div>
                </div>

                <!-- Step 3: feedback -->
                <div class="card" id="feedbackCard" style="display:none;">
                  <div class="card-header">
                    <div class="card-title">💬 Step 3 — Leave feedback <span class="badge badge-blue" style="font-size:0.65rem;">optional</span></div>
                    <div class="text-sm text-muted">AI uses this to improve future generations</div>
                  </div>
                  <div class="card-body">
                    <div class="form-group">
                      <label class="form-label">What did you think of this question?</label>
                      <textarea class="form-textarea" id="teacherFeedback" rows="3"
                        placeholder="e.g. 'Good depth, but make future questions harder.' or 'Too similar to last one — vary the scenario.'"></textarea>
                      <div class="form-hint">Stored locally and sent with every future generation request to shape the AI output.</div>
                    </div>
                    <div id="fbSaveBox"></div>
                    <div style="display:flex;justify-content:flex-end;gap:10px;">
                      <button class="btn btn-ghost" onclick="skipFeedback()">Skip</button>
                      <button class="btn btn-primary" id="saveFbBtn" onclick="saveFeedback()">Save Feedback</button>
                    </div>
                  </div>
                </div>

              </div>

              <!-- Right: feedback history -->
              <div class="feedback-panel">
                <div class="card-header">
                  <div class="card-title">📝 Feedback History</div>
                  <span class="badge badge-gray">${history.length}</span>
                </div>
                <div class="card-body" id="historyPanel">
                  ${history.length === 0 ? `
                    <div class="empty-state" style="padding:24px 12px;">
                      <div class="empty-state-icon" style="font-size:1.8rem;">💬</div>
                      <div class="empty-state-title">No feedback yet</div>
                      <div class="empty-state-sub">Feedback you provide shapes all future AI question generation for your class.</div>
                    </div>
                  ` : history.slice().reverse().map((f,i) => `
                    <div class="feedback-history-item">
                      <div style="font-size:0.7rem;color:var(--muted);margin-bottom:3px;">#${history.length - i}</div>
                      ${escHtml(f)}
                    </div>`).join('')}
                </div>
                ${history.length > 0 ? `
                  <div style="padding:10px 20px 16px;">
                    <button class="btn btn-ghost btn-sm w-full" onclick="clearHistory()">Clear history</button>
                  </div>` : ''}
              </div>

            </div>
          </div>
        </div>`;

      // Pre-select weakest concept in dropdown
      if (weakest) {
        const sel = document.getElementById('concept');
        if (sel) {
          const opt = [...sel.options].find(o => o.value === weakest.toLowerCase());
          if (opt) sel.value = opt.value;
        }
      }
    }

    async function generate() {
      const concept      = document.getElementById('concept').value;
      const difficulty   = document.getElementById('difficulty').value;
      const questionType = document.getElementById('questionType').value;
      const alertBox     = document.getElementById('genAlertBox');
      alertBox.innerHTML = '';

      const btn = document.getElementById('genBtn');
      btn.disabled = true;
      document.getElementById('genBtnText').innerHTML =
        '<div class="spinner" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;border-color:rgba(255,255,255,.3);border-top-color:#fff;"></div> Generating…';

      try {
        const result = await apiPost('/questions/generate', {
          teacher_id:    getTeacherId(),
          classroom_id:  getClassroomId(),
          concept,
          difficulty,
          question_type: questionType
        });

        // Auto-store as active question — backend already saved it
        setActiveQuestionId(result.question_id);

        // Populate result card
        document.getElementById('resultQid').textContent   = result.question_id;
        document.getElementById('resConcept').textContent  = result.concept || concept;
        document.getElementById('resPrompt').textContent   = result.prompt  || '—';
        document.getElementById('resAnswer').textContent   = result.correct_answer || '—';

        if (result.code_snippet) {
          document.getElementById('resCode').textContent    = result.code_snippet;
          document.getElementById('resCodeWrap').style.display = '';
        } else {
          document.getElementById('resCodeWrap').style.display = 'none';
        }

        if (result.target_misconception) {
          document.getElementById('resMiscon').textContent = result.target_misconception;
          document.getElementById('resMisconWrap').style.display = '';
        }

        document.getElementById('resultCard').style.display   = '';
        document.getElementById('feedbackCard').style.display = '';
        document.getElementById('resultCard').scrollIntoView({ behavior:'smooth', block:'start' });

      } catch(e) {
        alertBox.innerHTML = `<div class="alert alert-error">Generation failed: ${escHtml(e.message)}</div>`;
      } finally {
        btn.disabled = false;
        document.getElementById('genBtnText').textContent = '✨ Generate Another';
      }
    }

    function saveFeedback() {
      const fb = document.getElementById('teacherFeedback').value.trim();
      if (!fb) { skipFeedback(); return; }
      const history = getFeedbackHistory();
      history.push(fb);
      saveFeedbackHistory(history);
      document.getElementById('fbSaveBox').innerHTML =
        '<div class="alert alert-success">✓ Feedback saved — AI will use this next time.</div>';
      document.getElementById('saveFbBtn').disabled = true;
      setTimeout(() => {
        document.getElementById('resultCard').style.display   = 'none';
        document.getElementById('feedbackCard').style.display = 'none';
        document.getElementById('teacherFeedback').value = '';
        render();
      }, 1500);
    }

    function skipFeedback() {
      document.getElementById('resultCard').style.display   = 'none';
      document.getElementById('feedbackCard').style.display = 'none';
      document.getElementById('teacherFeedback').value = '';
      render();
    }

    function clearHistory() {
      if (!confirm('Clear all feedback history?')) return;
      saveFeedbackHistory([]);
      render();
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    render();
  </script>
</body>
</html>
